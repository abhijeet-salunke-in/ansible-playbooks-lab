---
#########################################################################
# Playbook Name : Clone Private GitHub Repository Using Ansible
#
# Objective:
# Clone a private GitHub repository from a managed host.
#
# Concepts Covered:
# 1. git module
# 2. Private Repository Access
# 3. Personal Access Token (PAT)
# 4. Ansible Vault
# 5. Secret Management
#
# Target Host Group:
# dev
#
# IMPORTANT:
# Never store actual Personal Access Tokens (PATs) in GitHub
# repositories. Use Ansible Vault or encrypted variables instead.
#########################################################################

- hosts: dev
  connection: ssh

  vars:

    #####################################################################
    # Example Variable
    #
    # In production environments, this value should come from
    # Ansible Vault instead of being hardcoded.
    #####################################################################

    github_pat: "<GITHUB_PAT>"

  tasks:

    #####################################################################
    # Task 1 : Clone Private Repository
    #
    # WHY?
    # Private repositories require authentication before Git can
    # download source code.
    #
    # A Personal Access Token (PAT) is commonly used instead of a
    # password.
    #
    # The git module authenticates using the PAT and clones the
    # repository into the specified destination directory.
    #
    #####################################################################

    - name: Clone Private GitHub Repository
      git:
        repo: "https://{{ github_pat }}@github.com/username/repository.git"
        dest: "/root/Desktop/Projects/"
        version: "main"
